name: Deploy CalPnt
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache busting
        run: |
          HASH=$(date +%s)
          # Aggiorna ?v= in tutti i file (gestisce sia assenza che presenza di ?v= esistente)
          sed -i -E "s/(\.js|\.css)(\?v=[^'\"]*)?([\"'])/\1?v=$HASH\3/g" index.html mobile.html app-desktop.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
