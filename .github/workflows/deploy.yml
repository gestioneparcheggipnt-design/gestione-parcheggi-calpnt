name: Deploy CalPnt
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache busting
        run: |
          HASH=$(date +%s)
          # Cache-bust i riferimenti .js/.css in index.html e mobile.html
          sed -i -E "s/(\.js|\.css)([\"'])/\1?v=$HASH\2/g" index.html mobile.html
          # Cache-bust gli import in app-desktop.js
          sed -i -E "s/(\.js)(\?v=[0-9]+)?'/\1?v=$HASH'/g" app-desktop.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
